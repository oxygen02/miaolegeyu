function loadImg(src) {
  return new Promise(r => { const i = new Image(); i.crossOrigin = 'anonymous'; i.onload = () => r(i); i.onerror = () => r(null); i.src = src; });
}

function fillRoundRect(ctx, x, y, w, h, r, color) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y+h,r);
  if(color){ctx.fillStyle=color;ctx.fill();}
}
function drawStar(ctx,cx,cy,r,color){
  ctx.save();ctx.fillStyle=color;ctx.beginPath();
  for(let i=0;i<5;i++){const a=(i*2*Math.PI)/5-Math.PI/2;const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);

}

  drawStar(ctx,cardX+130,y-5,7,'#FFE082');drawStar(ctx,cardX+cardW-110,y+50,6,'#FFE082');
  drawStar(ctx,cardX+50,y+55,5,'#FFE082');
  drawTrophy(ctx,cx,y+30,55);
  drawRibbon(ctx,cardX+25,y+40,22,10,'#FF8A65',-25);drawRibbon(ctx,cardX+cardW-20,y+35,18,8,'#81D4FA',30);
  drawRibbon(ctx,cardX+45,y+70,14,6,'#FFD54F',-40);drawRibbon(ctx,cardX+cardW-40,y+65,16,7,'#FF8A65',35);
  [{x:cardX+100,y:y+60,c:'#81D4FA',r:4},{x:cardX+cardW-80,y:y+15,c:'#FF8A65',r:3},
   {x:cardX+160,y:y+45,c:'#FFD54F',r:3},{x:cardX+cardW-140,y:y+55,c:'#A5D6A7',r:4}]
  .forEach(p=>{ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2).fill()});
}

async function drawResult(){
  const c=document.getElementById('result'),ctx=c.getContext('2d');
  const W=750,H=1280,cx=W/2;

  // 1. 背景
  ctx.fillStyle='#FFF5E9';ctx.fillRect(0,0,W,H);

  // 2. 色带
  const bandH=210;
  const grad=ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0,'#FF8A65');grad.addColorStop(.5,'#FF9F43');grad.addColorStop(1,'#FFB74D');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,bandH);

  ctx.save();ctx.globalAlpha=.08;ctx.fillStyle='#FFF';
  [{x:60,y:45,r:28},{x:W-70,y:60,r:20},{x:140,y:160,r:14},{x:W-120,y:135,r:16},{x:cx-160,y:85,r:10}].forEach(d=>{ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2).fill()});ctx.restore();

  ctx.beginPath();ctx.moveTo(0,180);ctx.bezierCurveTo(W*.15,160,W*.38,215,cx,188);ctx.bezierCurveTo(W*.65,165,W*.85,210,W,180);ctx.lineTo(W,bandH);ctx.lineTo(0,bandH);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.save();ctx.globalAlpha=.25;
  ctx.beginPath();ctx.moveTo(0,195);ctx.bezierCurveTo(W*.18,178,W*.42,225,cx,200);ctx.bezierCurveTo(W*.65,182,W*.88,220,W,195);ctx.lineTo(W,230);ctx.lineTo(0,230);ctx.closePath();ctx.fillStyle='#FFF';ctx.fill();ctx.restore();

  ctx.font='bold 52px sans-serif';ctx.fillStyle='#FFF';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('聚餐地点已定',cx,85);

  ctx.save();ctx.shadowColor='rgba(0,0,0,.12)';ctx.shadowBlur=16;ctx.shadowOffsetY=6;

  ctx.strokeStyle='#FF8A65';ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(cx,avatarCY,avatarR+6,0,Math.PI*2);ctx.stroke();
  if(catLogo){ctx.save();ctx.beginPath();ctx.arc(cx,avatarCY,avatarR,0,Math.PI*2);ctx.clip();ctx.drawImage(catLogo,cx-avatarR,avatarCY-avatarR,avatarR*2,avatarR*2);ctx.restore();}
  else { // fallback：图片加载失败时显示提示
    ctx.fillStyle='#FF8A65';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('头像加载中...',cx,avatarCY);
  }

  // 4. 白色卡片 (增高到880)
  const cardX=32,cardY=260,cardW=W-64,cardH=880,cardR=28;
  ctx.save();ctx.shadowColor='rgba(0,0,0,.06)';ctx.shadowBlur=30;ctx.shadowOffsetY=10;
  fillRoundRect(ctx,cardX,cardY,cardW,cardH,cardR,'#FFF');ctx.restore();

  let cy=cardY+35;

  drawCelebration(ctx,cardX,cy,cardW);cy+=110;

  ctx.font='bold 38px sans-serif';ctx.fillStyle='#2D2018';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('大渔铁板烧(海岸城店)',cx,cy);cy+=50;

  ctx.font='22px sans-serif';ctx.fillStyle='#999488';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('南山区海德三道 | 日本料理',cx,cy);cy+=48;

  ctx.font='bold 28px sans-serif';ctx.fillStyle='#2D2018';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('时间: 2026-05-10 18:30',cx,cy);cy+=35;

  ctx.fillStyle='#EDE8E2';ctx.fillRect(cardX+40,cy,cardW-80,1.5);cy+=45;

  // 5. 投票数据区（自适应宽度）
  const voteNum=8,percent=67,pCount=12;
  const voteY=cy+55,numStr=String(voteNum);
  ctx.font='bold 90px sans-serif';ctx.fillStyle='#FF8A65';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText(numStr,cardX+40,voteY);const numW=ctx.measureText(numStr).width;
  ctx.font='bold 36px sans-serif';ctx.fillStyle='#2D2018';
  ctx.fillText('票',cardX+40+numW+10,voteY);const ticketW=ctx.measureText('票').width;

  const barH=28,barY=voteY,capW=72,capH=40,leftPad=40,rightPad=40,ticketGap=16,bgGap=10;
  const usedLeft=leftPad+numW+10+ticketW+ticketGap,usedRight=bgGap+capW+rightPad;
  const barMaxW=Math.max(barH,cardW-usedLeft-usedRight),barX=cardX+usedLeft,barFillW=barMaxW*percent/100;

  fillRoundRect(ctx,barX,barY-barH/2,barMaxW,barH,barH/2,'#F0EBE4');
  if(barFillW>barH&&percent>0){const bg=ctx.createLinearGradient(barX,0,barX+barFillW,0);bg.addColorStop(0,'#FF8A65');bg.addColorStop(1,'#FF7043');fillRoundRect(ctx,barX,barY-barH/2,barFillW,barH,barH/2,bg);}
  const capX=barX+barMaxW+bgGap,capY=barY-capH/2;
  fillRoundRect(ctx,capX,capY,capW,capH,capH/2,'#FF8A65');
  ctx.font='bold 22px sans-serif';ctx.fillStyle='#FFF';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(percent+'%',capX+capW/2,capY+capH/2);

  cy=voteY+55;
  ctx.font='20px sans-serif';ctx.fillStyle='#999488';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('支持率 '+percent+'% · '+pCount+'人参与',cx,cy);cy+=55;

  ctx.fillStyle='#2D2018';const qs=90,qx=cx-qs/2,qy=qrCY-qs/2,cs=22,ct=4;
  ctx.fillRect(qx,qy,cs,ct);ctx.fillRect(qx,qy,ct,cs);ctx.fillRect(qx,qy+cs-ct,cs,ct);ctx.fillRect(qx+cs-ct,qy,ct,cs);
  ctx.fillStyle='#FFF';ctx.fillRect(qx+6,qy+6,cs-12,cs-12);ctx.fillStyle='#2D2018';ctx.fillRect(qx+10,qy+10,cs-20,cs-20);
  ctx.fillRect(qx+qs-cs,qy,cs,ct);ctx.fillRect(qx+qs-ct,qy,ct,cs);ctx.fillRect(qx+qs-cs,qy+cs-ct,cs,ct);ctx.fillRect(qx+qs-cs,qy,ct,cs);
  ctx.fillStyle='#FFF';ctx.fillRect(qx+qs-cs+6,qy+6,cs-12,cs-12);ctx.fillStyle='#2D2018';ctx.fillRect(qx+qs-cs+10,qy+10,cs-20,cs-20);
  ctx.fillRect(qx,qy+qs-cs,cs,ct);ctx.fillRect(qx,qy+qs-cs,ct,cs);ctx.fillRect(qx,qy+qs-ct,cs,ct);ctx.fillRect(qx+cs-ct,qy+qs-cs,ct,cs);
  ctx.fillStyle='#FFF';ctx.fillRect(qx+6,qy+qs-cs+6,cs-12,cs-12);ctx.fillStyle='#2D2018';ctx.fillRect(qx+10,qy+qs-cs+10,cs-20,cs-20);
  ctx.fillStyle='#2D2018';
  [[qx+35,qy+25,6,6],[qx+50,qy+20,5,5],[qx+42,qy+38,7,7],[qx+25,qy+50,5,5],[qx+55,qy+48,6,6],[qx+38,qy+55,5,5],[qx+qs-30,qy+qs-30,6,6],[qx+qs-45,qy+qs-25,5,5]]
  .forEach(d=>ctx.fillRect(d[0],d[1],d[2],d[3]));

  ctx.font='20px sans-serif';ctx.fillStyle='#999488';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('长按识别查看详情',cx,qrCY+qrR+18);cy=qrCY+qrR+55;

  // 7. 底部品牌
  ctx.fillStyle='#EDE8E2';ctx.fillRect(cardX+40,cy,cardW-80,1);cy+=30;
  const ls=44,lx=cx-70,ly=cy;
  fillRoundRect(ctx,lx,ly,ls,ls,10,'#FF8A65');
  drawCatIcon(ctx,lx+ls/2,ly+ls/2+2,12);
  ctx.font='bold 22px sans-serif';ctx.fillStyle='#2D2018';ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.fillText('喵了个鱼',lx+ls+12,ly+ls/2+6);
  ctx.font='16px sans-serif';ctx.fillStyle='#999488';
  ctx.fillText('让聚餐不再纠结',lx+ls+12,ly+ls/2+28);
}
