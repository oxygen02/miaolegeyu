<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海报 V8 重构预览 - 按设计稿</title>
<style>
  * { margin:0; padding:0; box-sizing: border-box; }
  body {
    background: #F0EBE4;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
    padding: 30px 16px;
  }
  .page-title { text-align: center; color: #2D2018; font-size: 22px; font-weight: bold; margin-bottom: 8px; }
  .page-sub { text-align: center; color: #999488; font-size: 13px; margin-bottom: 36px; line-height: 1.6; }
  .section { display: flex; flex-direction: column; align-items: center; gap: 50px; }
  .label { font-size: 16px; font-weight: bold; color: #5D4037; margin-bottom: 10px; }
  canvas { box-shadow: 0 16px 48px rgba(0,0,0,0.12); border-radius: 8px; }
</style>
</head>
<body>
<div class="page-title">海报 V8 - 按设计稿重构</div>
<div class="page-sub">庆祝风格 / 无餐厅大图 / 进度条 / 奖杯星星彩带</div>
<div class="section">
  <div>
    <div class="label">结果海报 V8</div>
    <canvas id="result" width="750" height="1220" style="width:375px;height:610px;"></canvas>
  </div>
</div>

<script>
const CDN = 'https://636c-cloud1-d5ggnf5wh2d872f3c-1423896909.tcb.qcloud.la';
const IMG = {
  juzeAvatar: `${CDN}/decorations/juze_avatar.png`,
};

function loadImg(src) {
  return new Promise(r => {
    const i = new Image(); i.crossOrigin = 'anonymous';
    i.onload = () => r(i); i.onerror = () => r(null); i.src = src;
  });
}

function fillRoundRect(ctx, x, y, w, h, r, color) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  if (color) { ctx.fillStyle = color; ctx.fill(); }
}

function strokeRoundRect(ctx, x, y, w, h, r, color, lineW) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  if (color) { ctx.strokeStyle = color; ctx.lineWidth = lineW || 1; ctx.stroke(); }
}

function drawStar(ctx, cx, cy, r, color) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 2 * Math.PI) / 5 - Math.PI / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    const innerAngle = angle + Math.PI / 5;
    const ix = cx + r * 0.4 * Math.cos(innerAngle);
    const iy = cy + r * 0.4 * Math.sin(innerAngle);
    ctx.lineTo(ix, iy);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawTrophy(ctx, x, y, size) {
  ctx.save();
  // 杯身（梯形）
  ctx.fillStyle = '#FFD54F';
  ctx.strokeStyle = '#F9A825';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x - size * 0.30, y + size * 0.15);
  ctx.lineTo(x + size * 0.30, y + size * 0.15);
  ctx.lineTo(x + size * 0.22, y + size * 0.55);
  ctx.lineTo(x - size * 0.22, y + size * 0.55);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // 杯口
  ctx.fillStyle = '#FFD54F';
  ctx.beginPath();
  ctx.ellipse(x, y + size * 0.12, size * 0.34, size * 0.10, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // 底座
  ctx.beginPath();
  ctx.moveTo(x - size * 0.22, y + size * 0.55);
  ctx.lineTo(x + size * 0.22, y + size * 0.55);
  ctx.lineTo(x + size * 0.18, y + size * 0.72);
  ctx.lineTo(x - size * 0.18, y + size * 0.72);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.roundRect(x - size * 0.22, y + size * 0.70, size * 0.44, size * 0.08, 3);
  ctx.fill(); ctx.stroke();
  // 左把手
  ctx.beginPath();
  ctx.arc(x - size * 0.36, y + size * 0.32, size * 0.14, -Math.PI * 0.3, Math.PI * 0.8);
  ctx.stroke();
  // 右把手
  ctx.beginPath();
  ctx.arc(x + size * 0.36, y + size * 0.32, size * 0.14, Math.PI * 0.2, Math.PI * 1.3);
  ctx.stroke();
  ctx.restore();
}

function drawRibbon(ctx, x, y, w, h, color, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot * Math.PI / 180);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(-w/2, -h/2);
  ctx.quadraticCurveTo(-w/4, -h, 0, -h/2);
  ctx.quadraticCurveTo(w/4, -h, w/2, -h/2);
  ctx.lineTo(w/2, h/2);
  ctx.quadraticCurveTo(w/4, h, 0, h/2);
  ctx.quadraticCurveTo(-w/4, h, -w/2, h/2);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

async function drawResultV8() {
  const c = document.getElementById('result');
  const ctx = c.getContext('2d');
  const W = 750, H = 1220, cx = W / 2;

  // ==================== 1. 背景 ====================
  ctx.fillStyle = '#FFF5E9';
  ctx.fillRect(0, 0, W, H);

  // ==================== 2. 顶部色带 ====================
  const bandH = 210;
  const grad = ctx.createLinearGradient(0, 0, W, 0);
  grad.addColorStop(0, '#FF8A65');
  grad.addColorStop(0.5, '#FF9F43');
  grad.addColorStop(1, '#FFB74D');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, bandH);

  // 色带装饰圆圈（更淡）
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = '#FFFFFF';
  [
    {x:60,y:45,r:28},{x:W-70,y:60,r:20},{x:140,y:160,r:14},{x:W-120,y:135,r:16},{x:cx-160,y:85,r:10}
  ].forEach(d => { ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2); ctx.fill(); });
  ctx.restore();

  // 波浪底边（双层）
  ctx.beginPath();
  ctx.moveTo(0, 180);
  ctx.bezierCurveTo(W*0.15, 160, W*0.38, 215, cx, 188);
  ctx.bezierCurveTo(W*0.65, 165, W*0.85, 210, W, 180);
  ctx.lineTo(W, bandH); ctx.lineTo(0, bandH);
  ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

  // 白色波浪过渡层
  ctx.save(); ctx.globalAlpha = 0.25;
  ctx.beginPath();
  ctx.moveTo(0, 195);
  ctx.bezierCurveTo(W*0.18, 178, W*0.42, 225, cx, 200);
  ctx.bezierCurveTo(W*0.65, 182, W*0.88, 220, W, 195);
  ctx.lineTo(W, 230); ctx.lineTo(0, 230);
  ctx.closePath(); ctx.fillStyle = '#FFFFFF'; ctx.fill();
  ctx.restore();

  // --- 色带标题 ---
  ctx.font = 'bold 52px sans-serif';
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('聚餐地点已定', cx, 85);

  // --- 色带副标题（可选） ---
  ctx.font = '22px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.fillText('喵了个鱼 · 投票结果', cx, 135);

  // ==================== 3. 猫咪头像 ====================
  const catLogo = await loadImg(IMG.juzeAvatar);
  const avatarCY = 205;
  const avatarR = 58;
  // 白底圆+阴影
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.12)';
  ctx.shadowBlur = 16; ctx.shadowOffsetY = 6;
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath(); ctx.arc(cx, avatarCY, avatarR + 6, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  // 描边
  ctx.strokeStyle = '#FF8A65';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, avatarCY, avatarR + 6, 0, Math.PI * 2); ctx.stroke();
  // 图片
  if (catLogo) {
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, avatarCY, avatarR, 0, Math.PI * 2); ctx.clip();
    ctx.drawImage(catLogo, cx - avatarR, avatarCY - avatarR, avatarR * 2, avatarR * 2);
    ctx.restore();
  }

  // ==================== 4. 白色大卡片 ====================
  const cardX = 32;
  const cardY = 260;
  const cardW = W - 64;
  const cardH = 720;
  const cardR = 28;

  // 卡片阴影
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.06)';
  ctx.shadowBlur = 30; ctx.shadowOffsetY = 10;
  fillRoundRect(ctx, cardX, cardY, cardW, cardH, cardR, '#FFFFFF');
  ctx.restore();

  let cy = cardY + 35;

  // --- 庆祝装饰区 ---
  // 大星星
  drawStar(ctx, cardX + 70, cy + 25, 14, '#FFD54F');
  drawStar(ctx, cardX + cardW - 65, cy + 30, 11, '#FFD54F');
  // 小星星
  drawStar(ctx, cardX + 130, cy - 5, 7, '#FFE082');
  drawStar(ctx, cardX + cardW - 110, cy + 50, 6, '#FFE082');
  drawStar(ctx, cardX + 50, cy + 55, 5, '#FFE082');
  // 奖杯
  drawTrophy(ctx, cx, cy + 30, 55);
  // 彩带
  drawRibbon(ctx, cardX + 25, cy + 40, 22, 10, '#FF8A65', -25);
  drawRibbon(ctx, cardX + cardW - 20, cy + 35, 18, 8, '#81D4FA', 30);
  drawRibbon(ctx, cardX + 45, cy + 70, 14, 6, '#FFD54F', -40);
  drawRibbon(ctx, cardX + cardW - 40, cy + 65, 16, 7, '#FF8A65', 35);
  // 小彩点
  const confetti = [
    {x:cardX+100,y:cy+60,c:'#81D4FA',r:4},{x:cardX+cardW-80,y:cy+15,c:'#FF8A65',r:3},
    {x:cardX+160,y:cy+45,c:'#FFD54F',r:3},{x:cardX+cardW-140,y:cy+55,c:'#A5D6A7',r:4},
    {x:cardX+85,y:cy+10,c:'#FFD54F',r:2},{x:cardX+cardW-100,y:cy+70,c:'#81D4FA',r:3},
  ];
  confetti.forEach(p => {
    ctx.fillStyle = p.c;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  });

  cy += 110;

  // --- 餐厅名 ---
  ctx.font = 'bold 38px sans-serif';
  ctx.fillStyle = '#2D2018';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('大渔铁板烧(海岸城店)', cx, cy);
  cy += 50;

  // --- 地址 | 分类 ---
  ctx.font = '22px sans-serif';
  ctx.fillStyle = '#999488';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('南山区海德三道 | 日本料理', cx, cy);
  cy += 48;

  // --- 时间 ---
  ctx.font = 'bold 28px sans-serif';
  ctx.fillStyle = '#2D2018';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('时间: 2026-05-10 18:30', cx, cy);
  cy += 35;

  // --- 分隔线 ---
  ctx.fillStyle = '#EDE8E2';
  ctx.fillRect(cardX + 40, cy, cardW - 80, 1.5);
  cy += 45;

  // ==================== 5. 投票数据区 ====================
  const voteNum = 8;
  const percent = 67;
  const pCount = 12;

  // 左侧：票数
  const voteY = cy + 55;
  ctx.font = 'bold 90px sans-serif';
  ctx.fillStyle = '#FF8A65';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  const numStr = String(voteNum);
  ctx.fillText(numStr, cardX + 40, voteY);
  const numW = ctx.measureText(numStr).width;

  ctx.font = 'bold 36px sans-serif';
  ctx.fillStyle = '#2D2018';
  ctx.fillText('票', cardX + 40 + numW + 10, voteY);

  // 右侧：进度条 + 百分比胶囊
  const barH = 28;
  const barY = voteY;
  const barMaxW = cardW - 80 - numW - 60;
  const barX = cardX + 40 + numW + 55;
  const barFillW = barMaxW * (percent / 100);

  // 进度条背景（圆角）
  fillRoundRect(ctx, barX, barY - barH/2, barMaxW, barH, barH/2, '#F0EBE4');

  // 进度条填充（渐变）
  const barGrad = ctx.createLinearGradient(barX, 0, barX + barFillW, 0);
  barGrad.addColorStop(0, '#FF8A65');
  barGrad.addColorStop(1, '#FF7043');
  if (barFillW > barH) {
    fillRoundRect(ctx, barX, barY - barH/2, barFillW, barH, barH/2, barGrad);
  }

  // 百分比胶囊（右端）
  const capW = 72;
  const capH = 40;
  const capX = barX + barMaxW + 10;
  const capY = barY - capH/2;
  fillRoundRect(ctx, capX, capY, capW, capH, capH/2, '#FF8A65');
  ctx.font = 'bold 22px sans-serif';
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(percent + '%', capX + capW/2, capY + capH/2);

  cy = voteY + 55;

  // --- 支持率说明文字 ---
  ctx.font = '20px sans-serif';
  ctx.fillStyle = '#999488';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('支持率 ' + percent + '% · ' + pCount + '人参与', cx, cy);
  cy += 55;

  // ==================== 6. 小程序码 ====================
  const qrR = 72;
  const qrCY = cy + qrR;
  // 白底圆
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.06)';
  ctx.shadowBlur = 16; ctx.shadowOffsetY = 4;
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath(); ctx.arc(cx, qrCY, qrR, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // 二维码占位
  ctx.fillStyle = '#F5F0EA';
  ctx.beginPath(); ctx.arc(cx, qrCY, qrR - 8, 0, Math.PI * 2); ctx.fill();
  // 模拟二维码图案
  ctx.fillStyle = '#2D2018';
  const qrSize = 90;
  const qrX = cx - qrSize/2;
  const qrY = qrCY - qrSize/2;
  // 三个定位角
  const cornerSize = 22;
  const cornerThickness = 4;
  // 左上
  ctx.fillRect(qrX, qrY, cornerSize, cornerThickness);
  ctx.fillRect(qrX, qrY, cornerThickness, cornerSize);
  ctx.fillRect(qrX, qrY + cornerSize - cornerThickness, cornerSize, cornerThickness);
  ctx.fillRect(qrX + cornerSize - cornerThickness, qrY, cornerThickness, cornerSize);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(qrX + 6, qrY + 6, cornerSize - 12, cornerSize - 12);
  ctx.fillStyle = '#2D2018';
  ctx.fillRect(qrX + 10, qrY + 10, cornerSize - 20, cornerSize - 20);
  // 右上
  ctx.fillRect(qrX + qrSize - cornerSize, qrY, cornerSize, cornerThickness);
  ctx.fillRect(qrX + qrSize - cornerThickness, qrY, cornerThickness, cornerSize);
  ctx.fillRect(qrX + qrSize - cornerSize, qrY + cornerSize - cornerThickness, cornerSize, cornerThickness);
  ctx.fillRect(qrX + qrSize - cornerSize, qrY, cornerThickness, cornerSize);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(qrX + qrSize - cornerSize + 6, qrY + 6, cornerSize - 12, cornerSize - 12);
  ctx.fillStyle = '#2D2018';
  ctx.fillRect(qrX + qrSize - cornerSize + 10, qrY + 10, cornerSize - 20, cornerSize - 20);
  // 左下
  ctx.fillRect(qrX, qrY + qrSize - cornerSize, cornerSize, cornerThickness);
  ctx.fillRect(qrX, qrY + qrSize - cornerSize, cornerThickness, cornerSize);
  ctx.fillRect(qrX, qrY + qrSize - cornerThickness, cornerSize, cornerThickness);
  ctx.fillRect(qrX + cornerSize - cornerThickness, qrY + qrSize - cornerSize, cornerThickness, cornerSize);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(qrX + 6, qrY + qrSize - cornerSize + 6, cornerSize - 12, cornerSize - 12);
  ctx.fillStyle = '#2D2018';
  ctx.fillRect(qrX + 10, qrY + qrSize - cornerSize + 10, cornerSize - 20, cornerSize - 20);
  // 中间随机小方块
  ctx.fillStyle = '#2D2018';
  const dots = [
    [qrX+35,qrY+25,6,6],[qrX+50,qrY+20,5,5],[qrX+42,qrY+38,7,7],
    [qrX+25,qrY+50,5,5],[qrX+55,qrY+48,6,6],[qrX+38,qrY+55,5,5],
    [qrX+qrSize-30,qrY+qrSize-30,6,6],[qrX+qrSize-45,qrY+qrSize-25,5,5],
  ];
  dots.forEach(d => ctx.fillRect(d[0], d[1], d[2], d[3]));

  ctx.font = '20px sans-serif';
  ctx.fillStyle = '#999488';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('长按识别查看详情', cx, qrCY + qrR + 18);

  cy = qrCY + qrR + 55;

  // ==================== 7. 底部品牌 ====================
  // 分隔线
  ctx.fillStyle = '#EDE8E2';
  ctx.fillRect(cardX + 40, cy, cardW - 80, 1);
  cy += 30;

  const logoSize = 44;
  const logoX = cx - 70;
  const logoY = cy;
  // 方形圆角Logo底
  fillRoundRect(ctx, logoX, logoY, logoSize, logoSize, 10, '#FF8A65');
  // Logo内的猫脸简化（用圆形+三角形耳朵）
  ctx.fillStyle = '#FFFFFF';
  const faceCX = logoX + logoSize/2;
  const faceCY = logoY + logoSize/2 + 2;
  const faceR = 12;
  ctx.beginPath(); ctx.arc(faceCX, faceCY, faceR, 0, Math.PI*2); ctx.fill();
  // 耳朵
  ctx.beginPath();
  ctx.moveTo(faceCX - 10, faceCY - 8);
  ctx.lineTo(faceCX - 14, faceCY - 18);
  ctx.lineTo(faceCX - 4, faceCY - 10);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(faceCX + 10, faceCY - 8);
  ctx.lineTo(faceCX + 14, faceCY - 18);
  ctx.lineTo(faceCX + 4, faceCY - 10);
  ctx.closePath(); ctx.fill();
  // 眼睛
  ctx.fillStyle = '#FF8A65';
  ctx.beginPath(); ctx.arc(faceCX - 4, faceCY - 1, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(faceCX + 4, faceCY - 1, 2.5, 0, Math.PI*2); ctx.fill();

  // 品牌名
  ctx.font = 'bold 22px sans-serif';
  ctx.fillStyle = '#2D2018';
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('喵了个鱼', logoX + logoSize + 12, logoY + logoSize/2 + 6);

  // slogan
  ctx.font = '16px sans-serif';
  ctx.fillStyle = '#999488';
  ctx.fillText('让聚餐不再纠结', logoX + logoSize + 12, logoY + logoSize/2 + 28);

  // ==================== 8. 底部留白区域品牌 ====================
  ctx.font = '16px sans-serif';
  ctx.fillStyle = '#D0C8BC';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('AI生成', 40, H - 20);
}

async function init() {
  await loadImg(IMG.juzeAvatar);
  await drawResultV8();
}
init();
</script>
</body>
</html>
