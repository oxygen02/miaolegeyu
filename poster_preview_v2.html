<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>喵了个鱼 - 海报预览 V2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0ebe4;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
    padding: 40px 20px;
  }
  .page-title {
    text-align: center;
    color: #3D2C22;
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 10px;
  }
  .page-subtitle {
    text-align: center;
    color: #8B7355;
    font-size: 14px;
    margin-bottom: 40px;
  }
  .poster-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 60px;
  }
  .poster-label {
    font-size: 18px;
    font-weight: bold;
    color: #5D4037;
    margin-bottom: 12px;
  }
  canvas {
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    border-radius: 12px;
  }
</style>
</head>
<body>
  <div class="page-title">喵了个鱼 - 海报设计 V2 预览</div>
  <div class="page-subtitle">猫鱼生活 / 暖橙渐变 / 猫爪装饰 / 波浪色带</div>
  <div class="poster-section">
    <div>
      <div class="poster-label">分享海报 - 邀请投票</div>
      <canvas id="shareCanvas" width="750" height="1400" style="width: 375px; height: 700px;"></canvas>
    </div>
    <div>
      <div class="poster-label">结果海报 - 聚餐已定</div>
      <canvas id="resultCanvas" width="750" height="1400" style="width: 375px; height: 700px;"></canvas>
    </div>
  </div>

<script>
// CDN 图片 URL
const CDN = 'https://636c-cloud1-d5ggnf5wh2d872f3c-1423896909.tcb.qcloud.la';
const IMAGES = {
  catFishLogo: `${CDN}/decorations/cat-fish-logo.png`,
  catDecoration: `${CDN}/decorations/cat-decoration.png`,
  catAvatarIcon: `${CDN}/decorations/cat-avatar-icon.png`,
  happyCatIcon: `${CDN}/decorations/happy-cat-icon.png`,
  peekingCatIcon: `${CDN}/decorations/peeking-cat-icon.png`,
  maoweiba: `${CDN}/banners/maoweiba.png`,
  singleclaw: `${CDN}/misc/singleclaw.png`,
  catPawIcon: `${CDN}/misc/cat-paw-icon.png`,
  taiyakiIcon: `${CDN}/banners/taiyaki-icon.png`,
  posterBg: `${CDN}/banners/poster-bg.png`,
};

// 工具函数
function loadImg(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

function drawRoundRect(ctx, x, y, w, h, r, fillStyle, shadow) {
  ctx.save();
  if (shadow) {
    ctx.shadowColor = 'rgba(93, 64, 55, 0.12)';
    ctx.shadowBlur = 20;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 6;
  }
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  if (fillStyle) { ctx.fillStyle = fillStyle; ctx.fill(); }
  ctx.restore();
}

function drawWaveHeader(ctx, w, h) {
  const grad = ctx.createLinearGradient(0, 0, w, 0);
  grad.addColorStop(0, '#FF9F43');
  grad.addColorStop(0.5, '#FFAD5C');
  grad.addColorStop(1, '#FF6B35');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  ctx.beginPath();
  ctx.moveTo(0, h);
  ctx.bezierCurveTo(w * 0.2, h - 40, w * 0.35, h - 10, w * 0.5, h - 30);
  ctx.bezierCurveTo(w * 0.65, h - 50, w * 0.85, h - 15, w, h - 35);
  ctx.lineTo(w, h);
  ctx.closePath();
  ctx.fillStyle = '#FFFBF5';
  ctx.fill();
}

function drawPawPrint(ctx, x, y, size, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha || 0.08;
  ctx.fillStyle = '#FF9F43';
  ctx.beginPath();
  ctx.ellipse(x, y + size * 0.15, size * 0.42, size * 0.36, 0, 0, Math.PI * 2);
  ctx.fill();
  const toes = [
    { dx: -size * 0.38, dy: -size * 0.32, r: size * 0.2 },
    { dx: -size * 0.12, dy: -size * 0.48, r: size * 0.2 },
    { dx: size * 0.12, dy: -size * 0.48, r: size * 0.2 },
    { dx: size * 0.38, dy: -size * 0.32, r: size * 0.2 },
  ];
  toes.forEach(t => {
    ctx.beginPath();
    ctx.arc(x + t.dx, y + t.dy, t.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.restore();
}

function drawDashedDivider(ctx, y, padX, w, color) {
  ctx.save();
  ctx.strokeStyle = color || '#F0EBE4';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(padX, y);
  ctx.lineTo(w - padX, y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawCapsule(ctx, cx, y, text, fontSize, bgColor, textColor, paddingH, paddingV) {
  ctx.font = `bold ${fontSize}px sans-serif`;
  const tw = ctx.measureText(text).width;
  const cw = tw + paddingH * 2;
  const ch = fontSize + paddingV * 2;
  drawRoundRect(ctx, cx - cw / 2, y, cw, ch, ch / 2, bgColor);
  ctx.fillStyle = textColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, cx, y + ch / 2);
  return ch;
}

// =========== 分享海报 ===========
async function drawSharePoster() {
  const canvas = document.getElementById('shareCanvas');
  const ctx = canvas.getContext('2d');
  const W = 750, H = 1400;

  // 底色
  ctx.fillStyle = '#FFFBF5';
  ctx.fillRect(0, 0, W, H);

  // 猫爪散落
  drawPawPrint(ctx, 80, 120, 60, 0.06);
  drawPawPrint(ctx, 650, 180, 45, 0.05);
  drawPawPrint(ctx, 120, 650, 35, 0.07);
  drawPawPrint(ctx, 630, 750, 50, 0.05);
  drawPawPrint(ctx, 90, 1050, 40, 0.06);
  drawPawPrint(ctx, 670, 1100, 30, 0.07);

  // 波浪色带
  drawWaveHeader(ctx, W, 220);

  // 色带上的猫头 logo（半透明）
  const catLogo = await loadImg(IMAGES.catFishLogo);
  if (catLogo) {
    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.drawImage(catLogo, W - 130, 25, 100, 100);
    ctx.restore();
  }

  // 标题
  ctx.font = 'bold 42px sans-serif';
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('一起来投票选餐厅', W / 2, 105);

  ctx.font = '26px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fillText('周末聚餐大作战', W / 2, 145);

  // 装饰线
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.roundRect(W / 2 - 30, 162, 60, 4, 2);
  ctx.fill();

  ctx.font = '18px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.fillText('扫码加入，投出你的一票', W / 2, 190);

  // 品牌猫头像
  const avatarCY = 265, avatarR = 55;
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(W / 2, avatarCY, avatarR + 6, 0, Math.PI * 2);
  ctx.fill();

  if (catLogo) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(W / 2, avatarCY, avatarR, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(catLogo, W / 2 - avatarR, avatarCY - avatarR, avatarR * 2, avatarR * 2);
    ctx.restore();
  }

  // 信息卡片
  const cardX = 45, cardY = 345, cardW = W - 90, cardH = 620;
  drawRoundRect(ctx, cardX, cardY, cardW, cardH, 24, '#FFFFFF', true);

  const pad = 55;
  const cx = W / 2;
  let cy = cardY + 50;

  // 房间号
  ctx.font = '18px sans-serif';
  ctx.fillStyle = '#B0A090';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('房间号', cx, cy);
  cy += 12;
  ctx.font = 'bold 68px sans-serif';
  ctx.fillStyle = '#3D2C22';
  ctx.fillText('886688', cx, cy + 58);
  cy += 78;

  // 密码
  drawCapsule(ctx, cx, cy, '密码 1234', 22, '#FFF5E9', '#FF8C42', 24, 12);
  cy += 56 + 10;

  // 虚线
  drawDashedDivider(ctx, cy, pad + 40, W);
  cy += 30;

  // 时间
  ctx.font = '18px sans-serif';
  ctx.fillStyle = '#B0A090';
  ctx.textAlign = 'center';
  ctx.fillText('时间', cx, cy);
  cy += 12;
  ctx.font = 'bold 26px sans-serif';
  ctx.fillStyle = '#3D2C22';
  ctx.fillText('2026-05-10 18:30', cx, cy + 24);
  cy += 56;

  // 地点
  ctx.font = '18px sans-serif';
  ctx.fillStyle = '#B0A090';
  ctx.fillText('地点', cx, cy);
  cy += 12;
  ctx.font = 'bold 26px sans-serif';
  ctx.fillStyle = '#3D2C22';
  ctx.fillText('深圳市南山区科技园', cx, cy + 24);

  // 二维码区
  const qrAreaY = cardY + cardH - 170;
  drawDashedDivider(ctx, qrAreaY, pad + 40, W);

  drawPawPrint(ctx, cardX + 25, qrAreaY + 30, 20, 0.12);
  drawPawPrint(ctx, cardX + cardW - 25, qrAreaY + 30, 20, 0.12);

  const qrCY = qrAreaY + 95;
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(cx, qrCY, 58, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#F0EBE4';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 二维码占位
  ctx.fillStyle = '#F5F0EB';
  ctx.beginPath();
  ctx.arc(cx, qrCY, 48, 0, Math.PI * 2);
  ctx.fill();
  ctx.font = '14px sans-serif';
  ctx.fillStyle = '#CCCCCC';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('小程序码', cx, qrCY);

  ctx.font = '18px sans-serif';
  ctx.fillStyle = '#B0A090';
  ctx.textBaseline = 'top';
  ctx.fillText('长按识别小程序码加入投票', cx, qrCY + 66);

  // 猫尾巴装饰
  const tailImg = await loadImg(IMAGES.maoweiba);
  if (tailImg) {
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.drawImage(tailImg, W - 140, cardY + cardH - 20, 120, 80);
    ctx.restore();
  }

  // 底部品牌
  if (catLogo) {
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.drawImage(catLogo, cx - 20, H - 110, 40, 40);
    ctx.restore();
  }
  ctx.font = 'bold 20px sans-serif';
  ctx.fillStyle = '#D4C8B8';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('喵了个鱼', cx, H - 55);
  ctx.font = '14px sans-serif';
  ctx.fillStyle = '#E0D8D0';
  ctx.fillText('让聚餐不再纠结', cx, H - 32);

  const bottomGrad = ctx.createLinearGradient(W * 0.2, 0, W * 0.8, 0);
  bottomGrad.addColorStop(0, 'rgba(255,159,67,0)');
  bottomGrad.addColorStop(0.5, 'rgba(255,159,67,0.3)');
  bottomGrad.addColorStop(1, 'rgba(255,159,67,0)');
  ctx.fillStyle = bottomGrad;
  ctx.fillRect(W * 0.2, H - 70, W * 0.6, 2);
}

// =========== 结果海报 ===========
async function drawResultPoster() {
  const canvas = document.getElementById('resultCanvas');
  const ctx = canvas.getContext('2d');
  const W = 750, H = 1400;

  // 底色
  ctx.fillStyle = '#FFFBF5';
  ctx.fillRect(0, 0, W, H);

  // 猫爪散落
  drawPawPrint(ctx, 70, 100, 55, 0.06);
  drawPawPrint(ctx, 670, 150, 40, 0.05);
  drawPawPrint(ctx, 100, 480, 30, 0.07);
  drawPawPrint(ctx, 650, 950, 45, 0.06);
  drawPawPrint(ctx, 80, 1200, 35, 0.05);

  // 波浪色带
  drawWaveHeader(ctx, W, 220);

  // 偷看猫
  const peekCat = await loadImg(IMAGES.peekingCatIcon);
  if (peekCat) {
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.drawImage(peekCat, W - 120, 30, 90, 90);
    ctx.restore();
  }

  // 标题
  ctx.font = 'bold 42px sans-serif';
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('聚餐地点已定', W / 2, 105);

  ctx.font = '26px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fillText('周末聚餐大作战', W / 2, 145);

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.roundRect(W / 2 - 30, 162, 60, 4, 2);
  ctx.fill();

  ctx.font = '18px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.fillText('恭喜! 大家的选择是...', W / 2, 190);

  // 开心猫头像
  const avatarCY = 268, avatarR = 52;
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(W / 2, avatarCY, avatarR + 5, 0, Math.PI * 2);
  ctx.fill();

  const happyCat = await loadImg(IMAGES.happyCatIcon);
  const catLogo = await loadImg(IMAGES.catFishLogo);
  const catImg = happyCat || catLogo;
  if (catImg) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(W / 2, avatarCY, avatarR, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(catImg, W / 2 - avatarR, avatarCY - avatarR, avatarR * 2, avatarR * 2);
    ctx.restore();
  }

  // 信息卡片
  const cardX = 45, cardY = 340, cardW = W - 90, cardH = 940;
  drawRoundRect(ctx, cardX, cardY, cardW, cardH, 24, '#FFFFFF', true);

  const pad = 55;
  const cx = W / 2;

  // 餐厅图片
  const imgX = 75, imgY = 370, imgW = W - 150, imgHH = 340;
  const taiyaki = await loadImg(IMAGES.taiyakiIcon);
  if (taiyaki) {
    ctx.save();
    drawRoundRect(ctx, imgX, imgY, imgW, imgHH, 18);
    ctx.clip();
    ctx.drawImage(taiyaki, imgX, imgY, imgW, imgHH);
    ctx.restore();
  }

  // 餐厅名称
  const nameStartY = imgY + imgHH + 35;
  ctx.font = 'bold 36px sans-serif';
  ctx.fillStyle = '#3D2C22';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('大渔铁板烧(海岸城店)', cx, nameStartY + 32);

  // 地址·分类
  let infoY = nameStartY + 58;
  ctx.font = '20px sans-serif';
  ctx.fillStyle = '#B0A090';
  ctx.fillText('南山区海德三道  |  日本料理', cx, infoY);

  // 价格标签
  infoY += 28;
  drawCapsule(ctx, cx, infoY, '人均 158', 20, '#FFF5E9', '#FF8C42', 20, 10);
  infoY += 48;

  // 分隔
  drawDashedDivider(ctx, infoY, pad + 30, W);
  infoY += 35;

  // 票数
  ctx.font = 'bold 72px sans-serif';
  ctx.fillStyle = '#FF8C42';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('8 票', cx, infoY + 64);

  infoY += 82;
  ctx.font = '20px sans-serif';
  ctx.fillStyle = '#B0A090';
  ctx.fillText('支持率 67%  |  12人参与', cx, infoY);

  // 进度条
  infoY += 30;
  const barW = cardW - pad * 2 - 80;
  const barX = (W - barW) / 2;
  const barH = 10;

  ctx.fillStyle = '#F0EBE4';
  ctx.beginPath();
  ctx.roundRect(barX, infoY, barW, barH, barH / 2);
  ctx.fill();

  const barGrad = ctx.createLinearGradient(barX, 0, barX + barW * 0.67, 0);
  barGrad.addColorStop(0, '#FF9F43');
  barGrad.addColorStop(1, '#FF6B35');
  ctx.fillStyle = barGrad;
  ctx.beginPath();
  ctx.roundRect(barX, infoY, Math.max(barH, barW * 0.67), barH, barH / 2);
  ctx.fill();

  // 时间
  infoY += 36;
  ctx.font = '20px sans-serif';
  ctx.fillStyle = '#B0A090';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('时间: 2026-05-10 18:30', cx, infoY);

  // 二维码
  const qrAreaY = cardY + cardH - 145;
  drawDashedDivider(ctx, qrAreaY, pad + 30, W);

  drawPawPrint(ctx, cardX + 25, qrAreaY + 25, 18, 0.12);
  drawPawPrint(ctx, cardX + cardW - 25, qrAreaY + 25, 18, 0.12);

  const qrCY = qrAreaY + 78;
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(cx, qrCY, 48, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#F0EBE4';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = '#F5F0EB';
  ctx.beginPath();
  ctx.arc(cx, qrCY, 40, 0, Math.PI * 2);
  ctx.fill();
  ctx.font = '14px sans-serif';
  ctx.fillStyle = '#CCCCCC';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('小程序码', cx, qrCY);

  ctx.font = '18px sans-serif';
  ctx.fillStyle = '#B0A090';
  ctx.textBaseline = 'top';
  ctx.fillText('长按识别小程序码查看详情', cx, qrCY + 58);

  // 猫尾巴
  const tailImg = await loadImg(IMAGES.maoweiba);
  if (tailImg) {
    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.drawImage(tailImg, W - 140, cardY + cardH - 30, 120, 80);
    ctx.restore();
  }

  // 底部品牌
  if (catLogo) {
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.drawImage(catLogo, cx - 20, H - 115, 40, 40);
    ctx.restore();
  }
  ctx.font = 'bold 20px sans-serif';
  ctx.fillStyle = '#D4C8B8';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('喵了个鱼', cx, H - 55);
  ctx.font = '14px sans-serif';
  ctx.fillStyle = '#E0D8D0';
  ctx.fillText('让聚餐不再纠结', cx, H - 32);

  const bottomGrad = ctx.createLinearGradient(W * 0.2, 0, W * 0.8, 0);
  bottomGrad.addColorStop(0, 'rgba(255,159,67,0)');
  bottomGrad.addColorStop(0.5, 'rgba(255,159,67,0.3)');
  bottomGrad.addColorStop(1, 'rgba(255,159,67,0)');
  ctx.fillStyle = bottomGrad;
  ctx.fillRect(W * 0.2, H - 70, W * 0.6, 2);
}

// 加载所有图片后绘制
async function init() {
  await Promise.all([
    loadImg(IMAGES.catFishLogo),
    loadImg(IMAGES.happyCatIcon),
    loadImg(IMAGES.peekingCatIcon),
    loadImg(IMAGES.maoweiba),
    loadImg(IMAGES.taiyakiIcon),
  ]);
  await drawSharePoster();
  await drawResultPoster();
}

init();
</script>
</body>
</html>
